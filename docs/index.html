<!doctype html><html lang="en"><head><meta charset="utf-8">
<title>Windown - Bedtime Routine</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body{margin:0;background:#1A120C;color:#F5E9DC;font-family:-apple-system,Helvetica,Arial,sans-serif;display:flex;min-height:100vh;align-items:center;justify-content:center;text-align:center}
.wrap{max-width:560px;padding:40px 20px}
h1{color:#8A5B3B;font-size:2.2rem;margin-bottom:8px}
p.tag{opacity:.85;font-size:1.1rem;margin-bottom:28px}
.pill{display:inline-block;padding:10px 22px;border:1px solid #8A5B3B;border-radius:999px;color:#8A5B3B;text-decoration:none;margin:6px}
footer{margin-top:40px;font-size:.8rem;opacity:.6}

  @keyframes floatOrb {
    0%, 100% { transform: translate(0,0) scale(1); }
    50% { transform: translate(30px,-40px) scale(1.08); }
  }
  @keyframes fadeUp {
    from { opacity:0; transform: translateY(16px); }
    to { opacity:1; transform: translateY(0); }
  }
  .orb {
    position: fixed; top: -120px; right: -120px; width: 420px; height: 420px;
    background: radial-gradient(circle, #8A5B3B55 0%, #8A5B3B00 70%);
    filter: blur(10px); pointer-events: none; z-index: 0;
    animation: floatOrb 9s ease-in-out infinite;
  }
  .wrap { position: relative; z-index: 1; }
  h1 { animation: fadeUp 0.8s ease-out both; }
  p.tagline { animation: fadeUp 0.8s ease-out 0.15s both; }
  .feature { animation: fadeUp 0.8s ease-out both; transition: transform 0.25s ease; }
  .feature:nth-of-type(1) { animation-delay: 0.3s; }
  .feature:nth-of-type(2) { animation-delay: 0.45s; }
  .feature:hover { transform: translateY(-3px); }
  footer { animation: fadeUp 0.8s ease-out 0.6s both; }
</style></head>
<body>
<div class="orb"></div><div class="wrap">
<h1>Windown - Bedtime Routine</h1>
<p class="tag">Checklist your wind-down steps before bed.</p>
<a class="pill" href="privacy.html">Privacy Policy</a>
<a class="pill" href="terms.html">Terms of Use</a>
<footer>Contact: s0533495227@gmail.com</footer>
</div></body></html>
