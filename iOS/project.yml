name: Windown
options:
  bundleIdPrefix: com.shimondeitel.bedtimeroutine2
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Windown:
    type: application
    platform: iOS
    sources:
      - path: Windown
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.bedtimeroutine2
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Windown/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  WindownTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: WindownTests
      - path: Windown.storekit
    dependencies:
      - target: Windown
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.bedtimeroutine2.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  WindownUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: WindownUITests
    dependencies:
      - target: Windown
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.bedtimeroutine2.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Windown:
    build:
      targets:
        Windown: all
        WindownTests: [test]
        WindownUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Windown.storekit
    test:
      config: Debug
      storeKitConfiguration: Windown.storekit
      targets:
        - WindownTests
        - WindownUITests
    archive:
      config: Release
